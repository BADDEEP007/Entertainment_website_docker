

services:
  backend:
    build: ./backend
    image: Baddeep/backend:latest
    container_name: backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    image: Baddeep/frontend:latest
    container_name: frontend
    ports:
      - "5172:5173"
    depends_on:
      - backend


