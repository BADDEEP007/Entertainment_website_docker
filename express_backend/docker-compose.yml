version: '3.8'

services:
  express-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Add your environment variables here or use .env file
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - BACKEND_URL=${BACKEND_URL}
      - PINGGY_URL=${PINGGY_URL}
    volumes:
      # Persist saved images
      - ./Saved_Images:/app/Saved_Images
      # Mount prompts directory
      - ./Prompts:/app/Prompts
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
