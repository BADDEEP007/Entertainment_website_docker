<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entertainment AI — Curate Your Evening</title>
  <meta name="description" content="AI-powered entertainment planner. Describe your mood and get a curated plan." />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <style>
    :root {
      --bg: #16161a; /* Made slightly lighter than original dark mode */
      --text-main: #f0f0f0;
      --text-muted: #888888;
      --accent: #d4af37;
      --accent-dim: rgba(212, 175, 55, 0.15);
      
      --border: rgba(255, 255, 255, 0.08);
      --fill-hover: rgba(255, 255, 255, 0.05);
      --fill-active: rgba(255, 255, 255, 0.08);
      --fill-light: rgba(255, 255, 255, 0.03);
      
      --glass-bg: rgba(25, 25, 30, 0.05);
      --glass-border: rgba(255, 255, 255, 0.03);

      --shadow-sm: rgba(0, 0, 0, 0.3);
      --shadow-md: rgba(0, 0, 0, 0.4);
      --shadow-lg: rgba(0, 0, 0, 0.5);
      --backdrop: rgba(0, 0, 0, 0.45);
      
      --blob-bg: #09090c;
      --blob-1: rgba(30,0,70,0.6);
      --blob-2: rgba(5,30,80,0.5);
      --code-bg: #0a0a0a;

      --sidebar-w: 272px;
      --nav-h: 56px;
      --ease-sidebar: cubic-bezier(0.4, 0, 0.2, 1);
      --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body.light-theme {
      --bg: #dadee3; /* Made slightly darker than original light mode */
      --text-main: #141416;
      --text-muted: #6b6b75;
      --accent: #b08611;
      --accent-dim: rgba(176, 134, 17, 0.15);
      
      --border: rgba(0, 0, 0, 0.1);
      --fill-hover: rgba(0, 0, 0, 0.05);
      --fill-active: rgba(0, 0, 0, 0.08);
      --fill-light: rgba(0, 0, 0, 0.03);
      
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.2);

      --shadow-sm: rgba(0, 0, 0, 0.04);
      --shadow-md: rgba(0, 0, 0, 0.08);
      --shadow-lg: rgba(0, 0, 0, 0.12);
      --backdrop: rgba(255, 255, 255, 0.25);
      
      --blob-bg: #c9cdd4;
      --blob-1: rgba(120,160,255,0.4);
      --blob-2: rgba(180,140,255,0.4);
      --code-bg: #e1e4e8;
    }

    .brand-cursive {
      font-family: 'Great Vibes', cursive;
      text-transform: none;
      font-size: 1.4em;
      font-weight: 400;
      letter-spacing: 0;
      color: var(--accent);
      margin-right: -0.1em;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-stack);
      display: flex;
      flex-direction: column;
    }

    /* ── Animated Background ── */
    .bg-shapes {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: var(--blob-bg); overflow: hidden;
    }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.45; animation: drift 30s infinite alternate ease-in-out; }
    .blob-1 { width: 45vw; height: 45vw; background: var(--blob-1); top: -10vw; left: -10vw; }
    .blob-2 { width: 55vw; height: 55vw; background: var(--blob-2); bottom: -15vw; right: -15vw; animation-duration: 40s; animation-direction: alternate-reverse; }
    .ent-svg { position: absolute; stroke-width: 1; opacity: 0.12; animation: float-space 30s infinite linear; }
    .svg-1 { width: 18vw; color: #d4af37; top: 10%; left: 10%; animation-duration: 45s; }
    .svg-2 { width: 22vw; color: var(--text-main); bottom: 15%; right: 10%; animation-duration: 35s; animation-direction: reverse; }
    .svg-3 { width: 15vw; color: #888888; top: 50%; left: 60%; animation-duration: 40s; }
    .svg-4 { width: 12vw; color: #d4af37; bottom: 20%; left: 20%; animation-duration: 30s; animation-direction: alternate; }
    
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(10vw,15vh) scale(1.2); } }
    @keyframes float-space {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(8vw,-8vh) rotate(120deg); }
      66%  { transform: translate(-8vw,8vh) rotate(240deg); }
      100% { transform: translate(0,0) rotate(360deg); }
    }

    /* ── Reusable Glass UI Theme ── */
    .glass-ui {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px var(--shadow-md);
    }

    /* ══════════════════════════════════════════
       LAYOUT — SPA Container
    ══════════════════════════════════════════ */
    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar Backdrop ── */
    #sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 199;
      background: var(--backdrop);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      animation: fadeIn 0.2s ease;
    }
    body.sidebar-open #sidebar-backdrop { display: block; }

    /* ── Sidebar ── fixed overlay, always full height, slides in/out */
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      overflow: hidden;
      /* slide out to the left when closed */
      transform: translateX(-100%);
      transition: transform 0.35s var(--ease-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 200;
      box-shadow: 10px 0 40px var(--shadow-lg);
    }
    body.sidebar-open #sidebar { transform: translateX(0); }

    .sidebar-inner {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .sidebar-brand {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-main);
      font-weight: 300;
      text-align: center;
    }

    .sidebar-section-label {
      padding: 0.5rem 1.25rem;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--text-muted); font-weight: 400;
    }

    .sidebar-new-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: transparent; color: var(--text-main);
      border: 1px solid var(--border);
      padding: 0.6rem 0.8rem; margin: 0 1.25rem 1rem; border-radius: 6px;
      text-decoration: none; font-size: 0.75rem; font-weight: 400;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .sidebar-new-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(212,175,55,0.05); }
    .sidebar-new-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .sidebar-body { flex: 1; overflow-y: auto; padding-bottom: 0.5rem; }
    .sidebar-body::-webkit-scrollbar { width: 3px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--fill-active); border-radius: 2px; }

    .history-empty { padding: 2.5rem 1.25rem; text-align: center; color: var(--text-muted); font-size: 0.82rem; line-height: 1.9; }
    .history-empty svg { width: 28px; height: 28px; stroke: var(--text-muted); fill: none; stroke-width: 1.5; opacity: 0.35; display: block; margin: 0 auto 0.75rem; }
    
    .history-item {
      display: flex; align-items: flex-start; gap: 0.65rem; padding: 0.7rem 1rem; cursor: pointer;
      border-radius: 8px; margin: 2px 8px; text-decoration: none; color: inherit; transition: background 0.15s;
      position: relative;
    }
    .history-item:hover { background: var(--fill-hover); }
    .history-item.active-item { background: rgba(212,175,55,0.08); }

    .history-more-wrapper {
      position: absolute; right: 0.4rem; top: 0.5rem;
      opacity: 0; transition: opacity 0.2s;
    }
    .history-item:hover .history-more-wrapper, .history-more-wrapper.show { opacity: 1; }
    
    .history-more-btn {
      background: transparent; border: none; padding: 0.3rem; cursor: pointer; color: var(--text-muted); border-radius: 4px;
      transition: background 0.2s, color 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .history-more-btn:hover, .history-more-wrapper.show .history-more-btn { background: var(--fill-active); color: var(--text-main); }
    .history-more-btn svg { width: 15px; height: 15px; fill: currentColor; }
    
    .history-dropdown {
      position: absolute; right: 0; top: 100%; margin-top: 4px;
      background: var(--bg); border: 1px solid var(--border); box-shadow: 0 4px 12px var(--shadow-md);
      border-radius: 6px; z-index: 50; display: none; overflow: hidden;
    }
    .history-more-wrapper.show .history-dropdown { display: block; }

    .history-delete-btn {
      background: transparent; border: none; color: #ff6b6b; padding: 0.55rem 0.9rem; font-size: 0.72rem; font-family: inherit; width: 100%;
      text-align: left; cursor: pointer; white-space: nowrap; transition: background 0.2s; letter-spacing: 0.03em;
    }
    .history-delete-btn:hover { background: rgba(255,107,107,0.12); }

    .history-icon {
      width: 24px; height: 24px; border-radius: 5px; background: var(--fill-light);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all 0.2s;
    }
    .history-icon svg { width: 11px; height: 11px; stroke: var(--text-muted); fill: none; stroke-width: 2; transition: stroke 0.2s; }
    .history-item:hover .history-icon svg { stroke: var(--text-main); }
    .history-item.active-item .history-icon { background: rgba(212,175,55,0.1); }
    .history-item.active-item .history-icon svg { stroke: var(--accent); }

    .history-text { flex: 1; min-width: 0; }
    .history-query { font-size: 0.8rem; color: var(--text-main); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
    .history-meta { font-size: 0.68rem; color: var(--text-muted); margin-top: 3px; display: flex; gap: 0.4rem; align-items: center; }
    .history-intent-tag { background: var(--border); border-radius: 4px; padding: 1px 5px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 400; }

    .sidebar-footer { padding: 0.8rem; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 0.5rem; }
    
    #theme-toggle, #clear-history-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      background: transparent; border: none; padding: 0.6rem; border-radius: 6px;
      color: var(--text-muted); font-size: 0.7rem; font-family: inherit; font-weight: 500;
      cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.2s;
    }
    #theme-toggle:hover, #clear-history-btn:hover { background: var(--fill-hover-strong, rgba(255,255,255,0.06)); color: var(--text-main); }
    #theme-toggle svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }
    
    #clear-history-btn:hover { color: #ff6b6b; }

    /* ── Main Region — always full width, sidebar floats above ── */
    .main-region {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;
    }

    /* ── Navbar ── */
    .nav {
      height: var(--nav-h);
      display: flex; align-items: center;
      /* Uses Glass UI Theme */
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      position: relative; z-index: 100; flex-shrink: 0;
      padding-right: 1.5rem;
    }
    
    /* Toggle: exactly width of collapsed sidebar or matching padding */
    #sidebar-toggle {
      height: 100%;
      display: flex; align-items: center;
      padding: 0 1rem; gap: 0.55rem; background: none; border: none;
      color: var(--text-muted); cursor: pointer; font-family: inherit;
      font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
      flex-shrink: 0; overflow: hidden; white-space: nowrap;
      transition: color 0.2s, background 0.2s;
    }
    #sidebar-toggle:hover { color: var(--accent); background: rgba(212,175,55,0.04); }
    #sidebar-toggle svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }

    #history-badge {
      margin-left: auto; background: var(--accent); color: #000; font-size: 0.58rem; font-weight: 700;
      min-width: 17px; height: 17px; border-radius: 9px; padding: 0 4px; display: none; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .nav-spacer { flex: 1; }

    .nav-brand {
      position: absolute; left: 50%; transform: translateX(-50%);
      color: var(--text-main); text-decoration: none; font-weight: 300;
      letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.78rem;
    }

    /* Back Button for SPA */
    .back-btn {
      display: none; align-items: center; gap: 0.4rem; background: transparent;
      border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted);
      font-size: 0.75rem; font-family: inherit; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0.35rem 0.75rem; cursor: pointer; text-decoration: none; transition: all 0.2s ease;
      margin-left: 1rem;
    }
    .back-btn.show { display: inline-flex; }
    .back-btn:hover { color: var(--text-main); border-color: var(--border); background: var(--border); }
    .back-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .nav-query { color: var(--text-muted); font-style: italic; font-size: 0.85rem; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── SPA Views Container ── */
    #views { flex: 1; position: relative; overflow-y: auto; overflow-x: hidden; }
    #views::-webkit-scrollbar { width: 5px; }
    #views::-webkit-scrollbar-track { background: transparent; }
    #views::-webkit-scrollbar-thumb { background: var(--fill-active); border-radius: 3px; }

    .view {
      position: absolute; inset: 0;
      opacity: 0; pointer-events: none; visibility: hidden;
      transition: opacity 0.3s ease;
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .view.active { opacity: 1; pointer-events: auto; visibility: visible; position: relative; }

    /* ══════════════════════════════════════════
       VIEW: NEW PLAN
    ══════════════════════════════════════════ */
    #view-new.view { align-items: center; justify-content: center; padding: 2rem; }

    .container {
      width: 100%; max-width: 760px; padding: 3rem; display: flex; flex-direction: column; align-items: center;
      border-radius: 24px; border-top: 1px solid var(--border);
    }

    .header { text-align: center; margin-bottom: 3.5rem; animation: fadeInDown 1s ease-out; }
    .header h1 { font-size: 2.8rem; font-weight: 300; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    .header p  { font-size: 0.95rem; color: var(--text-muted); font-weight: 300; letter-spacing: 0.05em; }

    .search-wrapper { width: 100%; max-width: 640px; animation: fadeInUp 1s ease-out 0.2s both; }

    .intent-selector { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
    .intent-btn {
      background: transparent; border: none; color: var(--text-muted); font-size: 0.82rem; letter-spacing: 0.05em;
      padding: 0.45rem 0.9rem; cursor: pointer; border-bottom: 1px solid transparent; transition: all 0.3s ease; text-transform: uppercase; font-family: inherit;
    }
    .intent-btn.active { color: var(--text-main); border-bottom-color: var(--accent); }
    .intent-btn:hover { color: var(--text-main); }

    .input-box {
      background: var(--glass); border: 1px solid var(--border); border-radius: 100px;
      padding: 0.5rem 0.5rem 0.5rem 1.75rem; display: flex; align-items: center;
      backdrop-filter: blur(10px); transition: box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .input-box:focus-within { border-color: rgba(212,175,55,0.4); box-shadow: 0 10px 40px rgba(212,175,55,0.1); }
    
    .main-input {
      flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1.05rem; font-weight: 300;
      outline: none; padding: 0.9rem 0; font-family: inherit;
    }
    .main-input::placeholder { color: #555555; }

    .submit-btn {
      background: var(--text-main); color: var(--bg); border: none; border-radius: 50%; width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.3s ease, background 0.3s ease; flex-shrink: 0;
    }
    .submit-btn:hover { background: var(--accent); transform: scale(1.05); }
    .submit-btn svg { width: 19px; height: 19px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .surprise-row { display: flex; justify-content: center; margin-top: 0.9rem; }
    #surprise-btn {
      display: inline-flex; align-items: center; gap: 0.45rem; background: transparent; border: 1px solid rgba(212,175,55,0.22);
      border-radius: 100px; color: var(--text-muted); font-size: 0.76rem; font-family: inherit; letter-spacing: 0.08em; padding: 0.45rem 1rem;
      cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    #surprise-btn:hover { border-color: rgba(212,175,55,0.6); color: var(--accent); box-shadow: 0 0 18px rgba(212,175,55,0.1); }
    #surprise-btn:hover .dice-icon { animation: roll-dice 0.5s ease; }
    #surprise-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    @keyframes roll-dice { 0% { transform: rotate(0deg) scale(1); } 30% { transform: rotate(-15deg) scale(1.1); } 60% { transform: rotate(20deg) scale(1.1); } 100% { transform: rotate(0deg) scale(1); } }

    .suggestions { display: flex; justify-content: center; gap: 0.75rem; margin-top: 1.75rem; flex-wrap: wrap; }
    .suggestion-chip {
      background: transparent; border: 1px solid var(--border); border-radius: 100px; color: var(--text-muted);
      font-size: 0.77rem; padding: 0.45rem 0.9rem; cursor: pointer; transition: all 0.3s ease; font-family: inherit;
    }
    .suggestion-chip:hover { border-color: var(--accent); color: var(--text-main); }

    #error-msg { color: #ff6b6b; margin-top: 0.75rem; font-size: 0.88rem; text-align: center; height: 20px; opacity: 0; transition: opacity 0.3s; }

    /* ══════════════════════════════════════════
       VIEW: RESULTS
    ══════════════════════════════════════════ */
    #view-results.view { padding: 3.5rem 2rem 4rem; align-items: center; }
    
    .results-inner { width: 100%; max-width: 1000px; display: flex; flex-direction: column; }

    .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; animation: fadeIn 0.5s ease; }
    .spinner { width: 38px; height: 38px; border: 1px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1.75rem; }
    .loading-status { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }

    .page-title { font-size: 2.2rem; font-weight: 300; margin-bottom: 2.5rem; text-align: center; letter-spacing: -0.02em; }

    .tabs { display: flex; gap: 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; justify-content: center; }
    .tab-btn {
      background: none; border: none; color: var(--text-muted); padding: 0.9rem 0; font-size: 0.85rem; text-transform: uppercase;
      letter-spacing: 0.05em; cursor: pointer; position: relative; transition: color 0.3s; font-family: inherit;
    }
    .tab-btn.active { color: var(--text-main); }
    .tab-btn::after {
      content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
      background: var(--accent); transform: scaleX(0); transition: transform 0.3s;
    }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-panel { display: none; animation: fadeIn 0.4s ease; }
    .tab-panel.active { display: block; }

    /* Markdown content container inherits glass-ui */
    .md-content {
      border-radius: 12px; padding: 2.5rem; color: var(--text-main); font-size: 1rem; line-height: 1.8;
      border-top: 1px solid var(--border);
    }
    .md-content > *:first-child { margin-top: 0; }
    .md-content > *:last-child  { margin-bottom: 0; }
    .md-content h1,.md-content h2,.md-content h3,.md-content h4 { color: var(--text-main); margin-top: 2.2rem; margin-bottom: 1rem; font-weight: 500; line-height: 1.3; }
    .md-content h1 { font-size: 1.9rem; color: var(--accent); }
    .md-content h2 { font-size: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .md-content h3 { font-size: 1.2rem; color: var(--text-main); }
    .md-content p { margin-bottom: 1.4rem; font-weight: 300; text-align: justify; }
    .md-content strong { font-weight: 600; color: var(--text-main); }
    .md-content em { font-style: italic; color: var(--text-muted); }
    .md-content ul,.md-content ol { margin-left: 1.5rem; margin-bottom: 1.6rem; font-weight: 300; }
    .md-content li { margin-bottom: 0.5rem; padding-left: 0.25rem; text-align: justify; }
    .md-content li > ul,.md-content li > ol { margin-top: 0.5rem; margin-bottom: 0; }
    .md-content blockquote {
      border-left: 3px solid var(--accent); padding: 0.9rem 1.25rem; margin: 1.6rem 0;
      background: rgba(212,175,55,0.05); border-radius: 0 8px 8px 0; font-style: italic; color: rgba(255,255,255,0.8);
    }
    .md-content pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem; overflow-x: auto; margin: 1.6rem 0; }
    .md-content code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; background: var(--fill-hover); padding: 0.2rem 0.35rem; border-radius: 4px; font-size: 0.88em; color: var(--accent); }
    .md-content pre code { background: transparent; padding: 0; color: var(--text-main); }
    .md-content table { width: 100%; border-collapse: collapse; margin: 1.8rem 0; font-size: 0.93rem; }
    .md-content th,.md-content td { text-align: left; padding: 0.9rem; border-bottom: 1px solid var(--border); }
    .md-content th { background: rgba(255,255,255,0.02); color: var(--text-main); font-weight: 500; }
    .md-content tr:last-child td { border-bottom: none; }
    .md-content hr { border: 0; height: 1px; background: var(--border); margin: 2.2rem 0; }

    #error-results { display: none; text-align: center; color: #ff6b6b; margin-top: 2rem; }

    @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin       { 100% { transform: rotate(360deg); } }
    @keyframes fadeIn     { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 700px) {
      .header h1 { font-size: 2rem; }
      .container { padding: 2rem 1.25rem; border-radius: 18px; }
      .md-content { padding: 1.5rem; }
      .page-title { font-size: 1.7rem; }
      .nav-brand { font-size: 0; } /* Hide text, keep icon if any, or hide. */
      .nav-brand::before { content: "EA"; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Animated background (fixed, behind everything) -->
  <div class="bg-shapes">
    <svg class="ent-svg svg-1" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
    <svg class="ent-svg svg-2" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <svg class="ent-svg svg-3" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
    <svg class="ent-svg svg-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="app-layout">
    
    <!-- Sidebar backdrop (closes sidebar on outside click) -->
    <div id="sidebar-backdrop" aria-hidden="true"></div>

    <!-- Sidebar (fixed overlay) -->
    <aside id="sidebar" class="glass-ui" aria-label="Past curations">
      {% include 'sidebar.html' %}
    </aside>

    <!-- Main Content Area -->
    <div class="main-region">
      
      <!-- Top Navigation -->
      <nav class="nav glass-ui" aria-label="Main Navigation">
        <button id="sidebar-toggle" aria-label="Toggle history sidebar">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6.5" x2="21" y2="6.5"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17.5" x2="21" y2="17.5"/></svg>
          <span style="display:none;">History</span>
        </button>
        <div id="history-badge"></div>
        
        <a href="/new" class="back-btn" id="nav-back-btn" aria-label="New plan">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          <span>New Plan</span>
        </a>

        <a href="/new" class="nav-brand nav-back-btn"><span class="brand-cursive">Entertainment</span> AI</a>
        
        <div class="nav-spacer"></div>

        <div class="nav-query" id="topbar-q"></div>
      </nav>

      <!-- Views (SPA) -->
      <div id="views">
        
        <!-- View: New Plan -->
        <div id="view-new" class="view active">
          <div class="container glass-ui">
            <div class="header">
              <h1><span class="brand-cursive">Entertainment</span> AI</h1>
              <p>Curate your perfect evening</p>
            </div>

            <div class="search-wrapper">
              <div class="intent-selector">
                <button class="intent-btn active" data-intent="both">Everything</button>
                <button class="intent-btn" data-intent="movies">Movies</button>
                <button class="intent-btn" data-intent="music">Music</button>
              </div>

              <div class="input-box">
                <input type="text" id="query" class="main-input" placeholder="Describe your mood..." autocomplete="off">
                <button id="btn-submit" class="submit-btn" aria-label="Generate Plan">
                  <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
              </div>

              <div class="surprise-row">
                <button id="surprise-btn" aria-label="Generate a random plan">
                  <svg class="dice-icon" viewBox="0 0 24 24">
                    <rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><circle cx="16" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="16" r="1.2" fill="currentColor"/><circle cx="16" cy="16" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/>
                  </svg>
                  Surprise Me
                </button>
              </div>

              <div id="error-msg"></div>

              <div class="suggestions">
                <button class="suggestion-chip" data-fill="Romantic dinner with classical music">Romantic Dinner</button>
                <button class="suggestion-chip" data-fill="Upbeat summer road trip vibes">Road Trip</button>
                <button class="suggestion-chip" data-fill="Cozy horror night with suspenseful tracks">Horror Night</button>
              </div>
            </div>
          </div>
        </div>

        <!-- View: Results -->
        <div id="view-results" class="view">
          <div class="results-inner">
            <div id="loading" class="loader-container">
              <div class="spinner"></div>
              <div class="loading-status" id="loading-status">Agents are curating your plan…</div>
            </div>

            <div id="error-results"></div>

            <div id="results-display" style="display:none;">
              <h1 class="page-title">Your Curated Plan</h1>

              <div class="tabs" id="tabs">
                <button class="tab-btn" id="tab-plan" onclick="showTab('plan')">Plan</button>
                <button class="tab-btn" id="tab-movies" onclick="showTab('movies')">Movies</button>
                <button class="tab-btn" id="tab-music" onclick="showTab('music')">Music</button>
              </div>

              <div id="panel-plan" class="tab-panel"><div class="md-content glass-ui" id="content-plan"></div></div>
              <div id="panel-movies" class="tab-panel"><div class="md-content glass-ui" id="content-movies"></div></div>
              <div id="panel-music" class="tab-panel"><div class="md-content glass-ui" id="content-music"></div></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ─── INITIALIZATION ───────────────────────────────────────────────────────────
    const INITIAL_PLAN_ID = "{{ plan_id|default('') }}";
    const HISTORY_KEY  = 'ent_ai_history';
    const SIDEBAR_KEY  = 'ent_sidebar_open';
    const MAX_HISTORY  = 40;
    
    let pollInterval = null;
    let currentPlanId = null;
    
    marked.setOptions({ breaks: true, gfm: true });

    // ─── SPA ROUTING ──────────────────────────────────────────────────────────────
    document.addEventListener("click", e => {
      // Handle the 3 dots dropdown button
      const moreBtn = e.target.closest('.history-more-btn');
      if (moreBtn) {
        e.preventDefault(); e.stopPropagation();
        const wrapper = moreBtn.closest('.history-more-wrapper');
        // Close others
        document.querySelectorAll('.history-more-wrapper.show').forEach(w => { if (w !== wrapper) w.classList.remove('show'); });
        wrapper.classList.toggle('show');
        return;
      }
      
      // Handle the Delete single history item button
      const delBtn = e.target.closest('.history-delete-btn');
      if (delBtn) {
        e.preventDefault(); e.stopPropagation();
        const id = delBtn.dataset.id;
        deleteSingleHistory(id);
        return;
      }

      // Close dropdowns if clicked elsewhere
      if (!e.target.closest('.history-more-wrapper')) {
        document.querySelectorAll('.history-more-wrapper.show').forEach(w => w.classList.remove('show'));
      }

      const link = e.target.closest("a.nav-back-btn, #nav-back-btn, .history-item, .sidebar-new-btn");
      if (link && link.origin === window.location.origin) {
        e.preventDefault();
        navigateTo(link.pathname);
      }
    });

    window.addEventListener("popstate", () => {
      navigateTo(window.location.pathname, false);
    });

    function navigateTo(path, push = true) {
      if (push) history.pushState({}, '', path);
      
      const newView = document.getElementById('view-new');
      const resView = document.getElementById('view-results');
      const backBtn = document.getElementById('nav-back-btn');
      const queryEl = document.getElementById('topbar-q');

      clearInterval(pollInterval);
      
      if (path === '/new' || path === '/') {
        newView.classList.add('active');
        resView.classList.remove('active');
        backBtn.classList.remove('show');
        queryEl.textContent = '';
        currentPlanId = null;
        renderHistoryHTML();
        document.getElementById('query').focus();
      } else if (path.startsWith('/results/')) {
        const id = path.split('/')[2];
        currentPlanId = id;
        newView.classList.remove('active');
        resView.classList.add('active');
        backBtn.classList.add('show');
        
        // Reset results view
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('results-display').style.display = 'none';
        document.getElementById('error-results').style.display = 'none';
        
        renderHistoryHTML();
        startPolling(id);
      }
    }

    // ─── SIDEBAR STATE ──────────────────────────────────────────────────────────
    // Sidebar is now a fixed overlay — start closed always
    let sidebarOpen = false;

    function applySidebarState() {
      document.body.classList.toggle('sidebar-open', sidebarOpen);
    }
    applySidebarState();

    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      applySidebarState();
    });

    // Close sidebar when clicking the backdrop
    document.getElementById('sidebar-backdrop').addEventListener('click', () => {
      sidebarOpen = false;
      applySidebarState();
    });

    // ─── THEME HANDLING ────────────────────────────────────────────────────────
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIconDark = document.getElementById('theme-icon-dark');
    const themeIconLight = document.getElementById('theme-icon-light');
    
    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light-theme');
        themeIconDark.style.display = 'block';
        themeIconLight.style.display = 'none';
      } else {
        document.body.classList.remove('light-theme');
        themeIconDark.style.display = 'none';
        themeIconLight.style.display = 'block';
      }
      localStorage.setItem('theme', theme);
    }
    
    const savedTheme = localStorage.getItem('theme') || 'dark';
    applyTheme(savedTheme);

    themeToggleBtn.addEventListener('click', () => {
      const isLight = document.body.classList.contains('light-theme');
      applyTheme(isLight ? 'dark' : 'light');
    });

    // Close sidebar when a history item or the new plan button is clicked
    document.getElementById('sidebar').addEventListener('click', e => {
      // Do not close sidebar if 3 dots or delete button is clicked
      if (e.target.closest('.history-more-btn') || e.target.closest('.history-delete-btn')) {
        return;
      }
      if (e.target.closest('.history-item') || e.target.closest('.sidebar-new-btn')) {
        sidebarOpen = false;
        applySidebarState();
      }
    });


    // ─── NEW PLAN LOGIC ─────────────────────────────────────────────────────────
    const RANDOM_PROMPTS = [
      { query: "A moody rainy evening with dark jazz and neo-noir thrillers", intent: "both" },
      { query: "Energetic weekend morning with indie pop and feel-good comedies", intent: "both" },
      { query: "Late night coding session with lo-fi hip hop", intent: "music" },
      { query: "Epic fantasy adventure with orchestral soundtracks", intent: "both" }
    ];

    let selectedIntent = 'both';
    document.querySelectorAll('.intent-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.intent-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedIntent = btn.dataset.intent;
      });
    });

    document.querySelectorAll('.suggestion-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('query').value = chip.dataset.fill;
        document.getElementById('query').focus();
      });
    });

    document.getElementById('surprise-btn').addEventListener('click', () => {
      const pick = RANDOM_PROMPTS[Math.floor(Math.random() * RANDOM_PROMPTS.length)];
      document.getElementById('query').value = pick.query;
      selectedIntent = pick.intent;
      document.querySelectorAll('.intent-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.intent === pick.intent);
      });
      setTimeout(() => submitQuery(), 380);
    });

    const input = document.getElementById('query');
    const submitBtn = document.getElementById('btn-submit');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitQuery(); });
    submitBtn.addEventListener('click', submitQuery);

    async function submitQuery() {
      const query = input.value.trim();
      const errBox = document.getElementById('error-msg');
      if (!query) { input.focus(); errBox.textContent = "Please describe your mood first."; errBox.style.opacity = 1; return; }
      errBox.style.opacity = 0;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<svg style="animation:spin 1s linear infinite" viewBox="0 0 24 24"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>';

      try {
        const res = await fetch('/api/plan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, intent: selectedIntent }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong.');
        
        // Reset button state and clear query
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
        input.value = '';
        
        navigateTo(`/results/${data.id}`);
      } catch (err) {
        errBox.textContent = err.message; errBox.style.opacity = 1;
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
      }
    }


    // ─── RESULTS LOGIC ──────────────────────────────────────────────────────────
    function showTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const btn   = document.getElementById('tab-' + name);
      const panel = document.getElementById('panel-' + name);
      if (btn)   btn.classList.add('active');
      if (panel) panel.classList.add('active');
    }

    function renderResults(data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('results-display').style.display = 'block';
      const intent = data.intent || 'both';
      
      document.getElementById('tab-plan').style.display   = intent === 'both' ? 'block' : 'none';
      document.getElementById('tab-movies').style.display = (intent === 'movies' || intent === 'both') ? 'block' : 'none';
      document.getElementById('tab-music').style.display  = (intent === 'music'  || intent === 'both') ? 'block' : 'none';
      
      if (data.plan)   document.getElementById('content-plan').innerHTML   = marked.parse(data.plan);
      if (data.movies) document.getElementById('content-movies').innerHTML = marked.parse(data.movies);
      if (data.music)  document.getElementById('content-music').innerHTML  = marked.parse(data.music);
      
      if (intent === 'both') showTab('plan');
      else if (intent === 'movies') showTab('movies');
      else showTab('music');
    }

    async function startPolling(id) {
      async function poll() {
        try {
          const res  = await fetch(`/api/result/${id}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'An error occurred.');
          
          document.getElementById('topbar-q').textContent = data.query || '';
          
          if (data.status === 'done') {
            clearInterval(pollInterval);
            renderResults(data);
            fetchHistory(); // refresh history once done
          } else if (data.status === 'error') {
            throw new Error(data.error || 'Failed to process plan.');
          }
        } catch (err) {
          clearInterval(pollInterval);
          document.getElementById('loading').style.display = 'none';
          const errEl = document.getElementById('error-results');
          errEl.style.display = 'block';
          errEl.textContent = err.message;
        }
      }
      poll();
      pollInterval = setInterval(poll, 2500);
    }


    // ─── HISTORY LOGIC ──────────────────────────────────────────────────────────
    let historyCache = [];

    async function fetchHistory() {
      try {
        const res = await fetch('/api/history');
        if (res.ok) {
          historyCache = await res.json();
          renderHistoryHTML();
        }
      } catch (e) {
        console.error('Failed to fetch history', e);
      }
    }

    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function formatRelativeTime(ts) {
      if (!ts) return 'Unknown';
      const d = Date.now() - ts;
      const m = Math.floor(d/60000), h = Math.floor(d/3600000), dd = Math.floor(d/86400000);
      if (m < 1) return 'Just now'; if (m < 60) return `${m}m ago`;
      if (h < 24) return `${h}h ago`; return `${dd}d ago`;
    }

    function renderHistoryHTML() {
      const body    = document.getElementById('sidebar-body');
      const badge   = document.getElementById('history-badge');
      const history = historyCache;

      if (history.length > 0) {
        badge.textContent   = history.length > 9 ? '9+' : history.length;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }

      if (history.length === 0) {
        body.innerHTML = `<div class="history-empty">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          <p>Your past curations<br>will appear here.</p>
        </div>`;
        return;
      }

      body.innerHTML = history.map(item => `
        <a class="history-item${item.id === currentPlanId ? ' active-item' : ''}" href="/results/${item.id}" title="${escapeHtml(item.query)}">
          <div class="history-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
          <div class="history-text">
            <div class="history-query">${escapeHtml(item.query)}</div>
            <div class="history-meta">
              <span class="history-intent-tag">${item.intent}</span>
              <span>${formatRelativeTime(item.ts)}</span>
            </div>
          </div>
          <div class="history-more-wrapper">
            <button class="history-more-btn" aria-label="Options">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
            </button>
            <div class="history-dropdown">
              <button class="history-delete-btn" data-id="${item.id}">Remove from list</button>
            </div>
          </div>
        </a>`).join('');
    }

    async function deleteSingleHistory(id) {
      document.querySelectorAll('.history-more-wrapper.show').forEach(w => w.classList.remove('show'));
      try {
        await fetch(`/api/history/${id}`, { method: 'DELETE' });
        historyCache = historyCache.filter(item => item.id !== id);
        renderHistoryHTML();
        if (currentPlanId === id) {
          navigateTo('/new', true); // Redirect to main page if deleting currently viewed setup
        }
      } catch(e) {
        console.error('Delete failed', e);
      }
    }

    document.getElementById('clear-history-btn').addEventListener('click', async () => {
      if (confirm('Clear all past curations?')) {
        await fetch('/api/history', { method: 'DELETE' });
        historyCache = [];
        renderHistoryHTML();
      }
    });

    // Initialize SPA view based on URL or variables
    if (INITIAL_PLAN_ID) {
      navigateTo(`/results/${INITIAL_PLAN_ID}`, false);
    } else {
      navigateTo('/new', false);
    }

    fetchHistory();
  </script>
</body>
</html>
