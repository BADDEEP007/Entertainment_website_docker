<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Curated Plan — Entertainment AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <style>
    :root {
      --bg: #050505;
      --surface: #0f0f0f;
      --text-main: #f0f0f0;
      --text-muted: #888888;
      --accent: #d4af37;
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.04);
      --sidebar-w: 272px;
      --nav-h: 52px;
      --ease-sidebar: cubic-bezier(0.4, 0, 0.2, 1);
      --font-stack: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-stack);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }

    /* ── Animated Background ── */
    .bg-shapes {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; background: #010105; overflow: hidden;
    }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: drift 30s infinite alternate ease-in-out; }
    .blob-1 { width: 45vw; height: 45vw; background: rgba(30,0,70,0.6); top: -10vw; left: -10vw; }
    .blob-2 { width: 55vw; height: 55vw; background: rgba(5,30,80,0.5); bottom: -15vw; right: -15vw; animation-duration: 40s; animation-direction: alternate-reverse; }
    .ent-svg { position: absolute; stroke-width: 1; opacity: 0.12; animation: float-space 30s infinite linear; }
    .svg-1 { width: 18vw; color: #d4af37; top: 10%; left: 10%; animation-duration: 45s; }
    .svg-2 { width: 22vw; color: #f0f0f0; bottom: 15%; right: 10%; animation-duration: 35s; animation-direction: reverse; }
    .svg-3 { width: 15vw; color: #888888; top: 50%; left: 60%; animation-duration: 40s; }
    .svg-4 { width: 12vw; color: #d4af37; bottom: 20%; left: 20%; animation-duration: 30s; animation-direction: alternate; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(10vw,15vh) scale(1.2); } }
    @keyframes float-space {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(8vw,-8vh) rotate(120deg); }
      66%  { transform: translate(-8vw,8vh) rotate(240deg); }
      100% { transform: translate(0,0) rotate(360deg); }
    }

    /* ══════════════════════════════════
       NAV BAR — contains sidebar toggle,
       back button, brand, and query
    ══════════════════════════════════ */
    .nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }

    /* Toggle: same width as sidebar column so it's always flush */
    #sidebar-toggle {
      width: var(--sidebar-w);
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.55rem;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
      overflow: hidden;
      white-space: nowrap;
      transition: width 0.35s var(--ease-sidebar), color 0.2s, background 0.2s;
    }
    #sidebar-toggle:hover { color: var(--accent); background: rgba(212,175,55,0.04); }
    #sidebar-toggle svg {
      width: 17px; height: 17px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round;
      flex-shrink: 0;
    }
    #history-badge {
      margin-left: auto;
      background: var(--accent); color: #000;
      font-size: 0.58rem; font-weight: 700;
      min-width: 17px; height: 17px;
      border-radius: 9px; padding: 0 4px;
      display: none; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .toggle-label {
      transition: opacity 0.2s, max-width 0.35s var(--ease-sidebar);
      max-width: 120px; overflow: hidden;
    }
    body.sidebar-collapsed #sidebar-toggle {
      width: 52px;
      border-right-color: transparent;
    }
    body.sidebar-collapsed .toggle-label { opacity: 0; max-width: 0; }
    body.sidebar-collapsed #history-badge { display: none !important; }

    /* Nav right side */
    .nav-right {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      overflow: hidden;
    }

    /* ── Back Button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: inherit;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .back-btn:hover {
      color: var(--text-main);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
    }
    .back-btn svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round;
    }

    .nav-brand {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    .nav-spacer { flex: 1; }

    .nav-query {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.85rem;
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 1;
    }

    /* ══════════════════════════════════
       PAGE LAYOUT
    ══════════════════════════════════ */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.35s var(--ease-sidebar);
      background: rgba(8,8,12,0.9);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    body.sidebar-collapsed #sidebar { width: 0; }

    .sidebar-inner {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      flex-shrink: 0; display: flex;
      flex-direction: column; height: 100%;
    }

    .sidebar-section-label {
      padding: 1.25rem 1.25rem 0.5rem;
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: rgba(136,136,136,0.6); font-weight: 400;
    }

    .sidebar-body { flex: 1; overflow-y: auto; padding-bottom: 0.5rem; }
    .sidebar-body::-webkit-scrollbar { width: 3px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .history-empty {
      padding: 2.5rem 1.25rem; text-align: center;
      color: var(--text-muted); font-size: 0.82rem; line-height: 1.9;
    }
    .history-empty svg {
      width: 28px; height: 28px; stroke: var(--text-muted); fill: none;
      stroke-width: 1.5; opacity: 0.35; display: block; margin: 0 auto 0.75rem;
    }

    .history-item {
      display: flex; align-items: flex-start; gap: 0.65rem;
      padding: 0.7rem 1rem; cursor: pointer; transition: background 0.15s;
      border-radius: 8px; margin: 2px 8px; text-decoration: none; color: inherit;
    }
    .history-item:hover { background: rgba(255,255,255,0.05); }
    .history-item.active-item { background: rgba(212,175,55,0.08); }

    .history-icon {
      width: 26px; height: 26px; border-radius: 6px;
      background: rgba(212,175,55,0.1);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .history-icon svg { width: 12px; height: 12px; stroke: var(--accent); fill: none; stroke-width: 2; }

    .history-text { flex: 1; min-width: 0; }
    .history-query {
      font-size: 0.82rem; color: var(--text-main); font-weight: 400;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
    }
    .history-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; display: flex; gap: 0.4rem; align-items: center; }
    .history-intent-tag {
      background: rgba(255,255,255,0.07); border-radius: 4px;
      padding: 1px 5px; font-size: 0.67rem;
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    .sidebar-footer { padding: 0.75rem 1rem; border-top: 1px solid var(--border); flex-shrink: 0; }
    #clear-history-btn {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,80,80,0.18); color: rgba(255,110,110,0.65);
      border-radius: 8px; padding: 0.55rem; font-size: 0.73rem;
      cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
      font-family: inherit; transition: all 0.2s;
    }
    #clear-history-btn:hover { background: rgba(255,80,80,0.07); border-color: rgba(255,80,80,0.35); color: rgba(255,110,110,1); }

    /* ── Main scrollable column ── */
    .main-column {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .main-column::-webkit-scrollbar { width: 5px; }
    .main-column::-webkit-scrollbar-track { background: transparent; }
    .main-column::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    main {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 3.5rem 2rem 4rem;
      flex: 1;
    }

    /* ── Loading ── */
    .loader-container {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 50vh; animation: fadeIn 0.5s ease;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 1px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1.75rem;
    }
    .loading-status {
      font-size: 0.82rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted);
    }

    /* ── Results ── */
    #results { display: none; }

    .page-title {
      font-size: 2.2rem; font-weight: 300; margin-bottom: 2.5rem;
      text-align: center; letter-spacing: -0.02em;
    }

    .tabs {
      display: flex; gap: 2rem; border-bottom: 1px solid var(--border);
      margin-bottom: 2rem; justify-content: center;
    }
    .tab-btn {
      background: none; border: none; color: var(--text-muted);
      padding: 0.9rem 0; font-size: 0.85rem; text-transform: uppercase;
      letter-spacing: 0.05em; cursor: pointer; position: relative; transition: color 0.3s;
      font-family: inherit;
    }
    .tab-btn.active { color: var(--text-main); }
    .tab-btn::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 100%; height: 2px; background: var(--accent);
      transform: scaleX(0); transition: transform 0.3s;
    }
    .tab-btn.active::after { transform: scaleX(1); }

    .tab-panel { display: none; animation: fadeIn 0.4s ease; }
    .tab-panel.active { display: block; }

    /* ── Markdown ── */
    .md-content {
      background: rgba(15,15,15,0.18);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 2.5rem;
      color: #dedede; font-size: 1rem; line-height: 1.8;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }
    .md-content > *:first-child { margin-top: 0; }
    .md-content > *:last-child  { margin-bottom: 0; }

    .md-content h1,.md-content h2,.md-content h3,.md-content h4 {
      color: var(--text-main); margin-top: 2.2rem; margin-bottom: 1rem;
      font-weight: 500; line-height: 1.3;
    }
    .md-content h1 { font-size: 1.9rem; color: var(--accent); }
    .md-content h2 { font-size: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .md-content h3 { font-size: 1.2rem; color: #f0f0f0; }

    .md-content p { margin-bottom: 1.4rem; font-weight: 300; text-align: justify; }
    .md-content strong { font-weight: 600; color: #fff; }
    .md-content em { font-style: italic; color: #ccc; }

    .md-content ul,.md-content ol { margin-left: 1.5rem; margin-bottom: 1.6rem; font-weight: 300; }
    .md-content li { margin-bottom: 0.5rem; padding-left: 0.25rem; text-align: justify; }
    .md-content li > ul,.md-content li > ol { margin-top: 0.5rem; margin-bottom: 0; }

    .md-content blockquote {
      border-left: 3px solid var(--accent); padding: 0.9rem 1.25rem; margin: 1.6rem 0;
      background: rgba(212,175,55,0.05); border-radius: 0 8px 8px 0;
      font-style: italic; color: rgba(255,255,255,0.8);
    }

    .md-content pre {
      background: #0a0a0a; border: 1px solid var(--border);
      border-radius: 8px; padding: 1.1rem; overflow-x: auto; margin: 1.6rem 0;
    }
    .md-content code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      background: rgba(255,255,255,0.05); padding: 0.2rem 0.35rem;
      border-radius: 4px; font-size: 0.88em; color: var(--accent);
    }
    .md-content pre code { background: transparent; padding: 0; color: #e0e0e0; }

    .md-content table { width: 100%; border-collapse: collapse; margin: 1.8rem 0; font-size: 0.93rem; }
    .md-content th,.md-content td { text-align: left; padding: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .md-content th { background: rgba(255,255,255,0.02); color: var(--text-main); font-weight: 500; }
    .md-content tr:last-child td { border-bottom: none; }

    .md-content hr { border: 0; height: 1px; background: rgba(255,255,255,0.07); margin: 2.2rem 0; }

    #error {
      display: none; text-align: center;
      color: #ff6b6b; margin-top: 2rem;
    }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      main { padding: 2rem 1rem 3rem; }
      .md-content { padding: 1.5rem; }
      .tabs { gap: 1rem; }
      .tab-btn { font-size: 0.78rem; }
      .page-title { font-size: 1.7rem; }
      #sidebar-toggle { width: 52px; }
      .toggle-label { display: none; }
      .back-btn span { display: none; }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-shapes">
    <svg class="ent-svg svg-1" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
    <svg class="ent-svg svg-2" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <svg class="ent-svg svg-3" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
    <svg class="ent-svg svg-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- ══ NAV BAR ══ -->
  <nav class="nav">
    <!-- Toggle: occupies sidebar column width so it stays flush with sidebar -->
    <button id="sidebar-toggle" aria-label="Toggle history sidebar">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6.5" x2="21" y2="6.5"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17.5" x2="21" y2="17.5"/></svg>
      <span class="toggle-label">History</span>
      <div id="history-badge"></div>
    </button>

    <div class="nav-right">
      <!-- Back button -->
      <a href="/new" class="back-btn" aria-label="New plan">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span>New Plan</span>
      </a>

      <a href="/new" class="nav-brand">Entertainment AI</a>

      <div class="nav-spacer"></div>

      <div class="nav-query" id="topbar-q"></div>
    </div>
  </nav>

  <!-- ══ LAYOUT ══ -->
  <div class="layout">

    <!-- Sidebar: in-flow, width animates -->
    <aside id="sidebar" aria-label="Past curations">
      <div class="sidebar-inner">
        <div class="sidebar-section-label">Past Curations</div>
        <div class="sidebar-body" id="sidebar-body"></div>
        <div class="sidebar-footer">
          <button id="clear-history-btn">Clear all history</button>
        </div>
      </div>
    </aside>

    <!-- Main scrollable column -->
    <div class="main-column">
      <main>
        <div id="loading" class="loader-container">
          <div class="spinner"></div>
          <div class="loading-status" id="loading-status">Agents are curating your plan…</div>
        </div>

        <div id="error"></div>

        <div id="results">
          <h1 class="page-title">Your Curated Plan</h1>

          <div class="tabs" id="tabs">
            <button class="tab-btn" id="tab-plan"   onclick="showTab('plan')">Plan</button>
            <button class="tab-btn" id="tab-movies" onclick="showTab('movies')">Movies</button>
            <button class="tab-btn" id="tab-music"  onclick="showTab('music')">Music</button>
          </div>

          <div id="panel-plan"   class="tab-panel"><div class="md-content" id="content-plan"></div></div>
          <div id="panel-movies" class="tab-panel"><div class="md-content" id="content-movies"></div></div>
          <div id="panel-music"  class="tab-panel"><div class="md-content" id="content-music"></div></div>
        </div>
      </main>
    </div>

  </div><!-- /.layout -->

  <script>
    const PLAN_ID     = '{{ plan_id }}';
    const HISTORY_KEY = 'ent_ai_history';
    const SIDEBAR_KEY = 'ent_sidebar_open';
    let pollInterval  = null;

    marked.setOptions({ breaks: true, gfm: true });

    // ─── Sidebar state (shared with home page) ────────────────────────────────────
    const isMobile = window.innerWidth < 640;
    let sidebarOpen = localStorage.getItem(SIDEBAR_KEY) !== null
      ? localStorage.getItem(SIDEBAR_KEY) === 'true'
      : !isMobile;

    function applySidebarState() {
      document.body.classList.toggle('sidebar-collapsed', !sidebarOpen);
    }
    applySidebarState();

    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      localStorage.setItem(SIDEBAR_KEY, sidebarOpen);
      applySidebarState();
      if (sidebarOpen) renderHistory();
    });

    // ─── Tabs ─────────────────────────────────────────────────────────────────────
    function showTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const btn   = document.getElementById('tab-' + name);
      const panel = document.getElementById('panel-' + name);
      if (btn)   btn.classList.add('active');
      if (panel) panel.classList.add('active');
    }

    function renderResults(data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('results').style.display = 'block';
      const intent = data.intent || 'both';
      document.getElementById('tab-plan').style.display   = intent === 'both' ? 'block' : 'none';
      document.getElementById('tab-movies').style.display = (intent === 'movies' || intent === 'both') ? 'block' : 'none';
      document.getElementById('tab-music').style.display  = (intent === 'music'  || intent === 'both') ? 'block' : 'none';
      if (data.plan)   document.getElementById('content-plan').innerHTML   = marked.parse(data.plan);
      if (data.movies) document.getElementById('content-movies').innerHTML = marked.parse(data.movies);
      if (data.music)  document.getElementById('content-music').innerHTML  = marked.parse(data.music);
      if (intent === 'both') showTab('plan');
      else if (intent === 'movies') showTab('movies');
      else showTab('music');
    }

    // ─── Polling ──────────────────────────────────────────────────────────────────
    async function poll() {
      try {
        const res  = await fetch(`/api/result/${PLAN_ID}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'An error occurred.');
        document.getElementById('topbar-q').textContent = data.query || '';
        if (data.status === 'done') {
          clearInterval(pollInterval);
          renderResults(data);
        } else if (data.status === 'error') {
          throw new Error(data.error || 'Failed to process plan.');
        }
      } catch (err) {
        clearInterval(pollInterval);
        document.getElementById('loading').style.display = 'none';
        const errEl = document.getElementById('error');
        errEl.style.display = 'block';
        errEl.textContent = err.message;
      }
    }
    poll();
    pollInterval = setInterval(poll, 2500);

    // ─── History ──────────────────────────────────────────────────────────────────
    function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; } }

    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function formatRelativeTime(ts) {
      const d = Date.now() - ts;
      const m = Math.floor(d/60000), h = Math.floor(d/3600000), dd = Math.floor(d/86400000);
      if (m < 1) return 'Just now'; if (m < 60) return `${m}m ago`;
      if (h < 24) return `${h}h ago`; return `${dd}d ago`;
    }

    function renderHistory() {
      const body    = document.getElementById('sidebar-body');
      const badge   = document.getElementById('history-badge');
      const history = getHistory();

      if (history.length > 0) {
        badge.textContent   = history.length > 9 ? '9+' : history.length;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }

      if (history.length === 0) {
        body.innerHTML = `<div class="history-empty">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          <p>Your past curations<br>will appear here.</p>
        </div>`;
        return;
      }

      body.innerHTML = history.map(item => `
        <a class="history-item${item.id === PLAN_ID ? ' active-item' : ''}" href="/results/${item.id}" title="${escapeHtml(item.query)}">
          <div class="history-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
          <div class="history-text">
            <div class="history-query">${escapeHtml(item.query)}</div>
            <div class="history-meta">
              <span class="history-intent-tag">${item.intent}</span>
              <span>${formatRelativeTime(item.ts)}</span>
            </div>
          </div>
        </a>`).join('');
    }

    document.getElementById('clear-history-btn').addEventListener('click', () => {
      if (confirm('Clear all past curations?')) {
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
      }
    });

    // Init
    renderHistory();
  </script>
</body>
</html>
